version: '3'

services:
  web:
    build: .
    expose:
      - "5001"
    volumes:
      - ./app:/app
    environment:
      - FLASK_ENV=development
  redis:
    image: "redis:alpine"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

volumes:
  redis-data: